run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gocritic

issues:
  exclude-rules:
    # Test files can be a little more relaxed.
    - path: _test\.go
      linters:
        - errcheck
