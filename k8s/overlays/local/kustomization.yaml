apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Minikube / local overlay.
#
# It reuses the full base and then removes the two resources that require
# extra CRDs not present on a vanilla minikube:
#   * ServiceMonitor  (needs the Prometheus Operator)
#   * IngressRoute    (needs the Traefik CRDs)
# A standard Ingress (with the nginx addon) is used instead, and the image is
# switched to the locally-built devops-showcase:local with pullPolicy Never.

namespace: devops-showcase

resources:
  - ../../base

images:
  - name: ghcr.io/OWNER/devops-showcase
    newName: devops-showcase
    newTag: local

patches:
  # Use the image we built into minikube's Docker daemon; never try to pull.
  - target:
      kind: Deployment
      name: devops-showcase
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Label the environment.
  - target:
      kind: ConfigMap
      name: devops-showcase-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: minikube
  # Route the standard Ingress through the minikube nginx ingress controller.
  - target:
      kind: Ingress
      name: devops-showcase
    patch: |-
      - op: replace
        path: /metadata/annotations/kubernetes.io~1ingress.class
        value: nginx
      - op: add
        path: /spec/ingressClassName
        value: nginx
  # Remove the Prometheus-Operator ServiceMonitor (no CRD on vanilla minikube).
  - patch: |-
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: devops-showcase
      $patch: delete
  # Remove the Traefik IngressRoute (no Traefik CRDs on vanilla minikube).
  - patch: |-
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: devops-showcase
      $patch: delete
