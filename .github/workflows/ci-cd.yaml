name: CI/CD

# Build, test, scan, containerise and (on main) deploy.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: "1.23"

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint, vet and unit-test the Go code.
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Unit tests (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ---------------------------------------------------------------------------
  # 2. Build & push the multi-arch image, then scan it with Trivy.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: test
    # Only publish images from the canonical repo (not PRs from forks).
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      # Scan the pushed image for HIGH/CRITICAL CVEs. We install the Trivy CLI
      # directly (rather than a versioned marketplace action) to avoid brittle
      # action-version pinning. Report-only: exit-code 0 never fails the build.
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy image scan
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress --format table "$IMG"
          trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress --format sarif --output trivy-results.sarif "$IMG"

      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # 3. Validate the Kubernetes manifests render cleanly.
  # ---------------------------------------------------------------------------
  manifests:
    name: Validate k8s manifests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: kustomize build (staging & production)
        run: |
          kubectl kustomize k8s/overlays/staging   > /tmp/staging.yaml
          kubectl kustomize k8s/overlays/production > /tmp/production.yaml
          echo "Rendered staging and production overlays successfully."

  # ---------------------------------------------------------------------------
  # 4. Deploy. This is a stub that shows the shape of a GitOps-style rollout.
  #    Wire it to your cluster by adding a kubeconfig secret and uncommenting
  #    the apply step, or hand off to Argo CD / Flux.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    needs: [build, manifests]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Render production manifests with new image
        run: |
          cd k8s/overlays/production
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          echo "Would set image to ${IMG}"
          # kustomize edit set image ghcr.io/OWNER/devops-showcase=${IMG}
      # - name: kubectl apply
      #   run: kubectl apply -k k8s/overlays/production
      #   env:
      #     KUBECONFIG: ${{ secrets.KUBECONFIG }}
      - name: Deployment placeholder
        run: echo "Hook this to your cluster (kubectl/Argo CD/Flux)."
