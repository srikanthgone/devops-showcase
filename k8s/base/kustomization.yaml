apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-showcase

commonLabels:
  app.kubernetes.io/part-of: devops-showcase

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - ingressroute.yaml
  - servicemonitor.yaml

# Central place to set the image. CI overrides the tag via
# `kustomize edit set image` or the overlays below.
images:
  - name: ghcr.io/OWNER/devops-showcase
    newName: ghcr.io/OWNER/devops-showcase
    newTag: latest
